<html lang="en">

<body class="page-stats">
<nav></nav>

<div class="page">

</div>
<div class="num-card">

</div>
<div class="num-card">

</div>
</div>

<!-- RATING BREAKDOWN -->
<div class="section-eyebrow">◈ Breakdown</div>
<div class="section-title">BY RATING</div>
<div class="rating-bars">
<div class="rbar">
<div class="rbar-label">🍒🍒🍒🍒🍒 Legendary</div>
<div class="rbar-track"><div class="rbar-fill r5-fill" id="bar-5"></div></div>
<div class="rbar-count" id="count-5">—</div>
</div>
    <div class="rbar">
<div class="rbar-label">🍒🍒🍒🍒 Perfect</div>

</div>

<div class="rbar-track"><div class="rbar-fill r3-fill" id="bar-3"></div></div>

</div>
<div class="rbar">
<div class="rbar-label">🍒🍒 Worth A Trip</div>
<div class="rbar-track"><div class="rbar-fill r2-fill" id="bar-2"></div></div>
<div class="rbar-count" id="count-2">—</div>
</div>
<div class="rbar">
<div class="rbar-label">🍒 Solid</div>
<div class="rbar-track"><div class="rbar-fill r1-fill" id="bar-1"></div></div>

</div>

<div class="rbar-label">ㄨ Skip It</div>

<!-- CITIES -->
<div class="section-eyebrow">◈ Coverage</div>
<div class="section-title">BY CITY</div>
<div class="city-grid" id="city-grid">
<div class="loading-state">Loading...</div>
</div>

<!-- CONTRIBUTORS -->
<div class="section-eyebrow">◈ Community</div>
<div class="section-title">CONTRIBUTORS</div>
<div class="contrib-grid" id="contrib-grid">
<div class="loading-state">Loading...</div>
</div>
</div>

<script src="/config.js"></script>
<script>
function parseRating(line) {
const stars = (line.match(/⭐/g) || []).length;
if (/^[ㄨ✗Xx]/.test(line) && stars === 0) return 0;
if (stars >= 1 && stars <= 3) return stars;
return null;
}

function parsePost(text) {
if (!text || !/#CBDB/i.test(text)) return null;
const lines = text.replace(/\r/g, '').split('\n');
if (lines.length < 4) return null;
const location = lines[1].trim();
const ratingNum = parseRating(lines[2].trim());
if (ratingNum === null || !location.includes(',')) return null;
return { location, ratingNum };
}

async function loadStats() {
const reviews = [];
await Promise.all([...APPROVED].map(async handle => {
try {
const url = `${BSKY_API}/app.bsky.feed.getAuthorFeed?actor=${encodeURIComponent(handle)}&limit=${FETCH_LIMIT}&filter=posts_no_replies`;
const res = await fetch(url);
if (!res.ok) return;
const data = await res.json();
for (const item of (data.feed || [])) {
const post = item.post;
if (!post) continue;
const text = post.record?.text || '';
if (!/#CBDB/i.test(text)) continue;
const parsed = parsePost(text);
if (!parsed) continue;
reviews.push({
handle,
location: parsed.location,
r: parsed.ratingNum,
createdAt: post.record?.createdAt || '',
});
}
} catch(e) { console.warn(handle, e); }
}));
renderStats(reviews);
}

function renderStats(reviews) {
const total = reviews.length;
const cities = [...new Set(reviews.map(r => r.location))];
const contributors = [...new Set(reviews.map(r => r.handle))];
const yearStart = new Date(); yearStart.setFullYear(yearStart.getFullYear() - 1);
const thisYear = reviews.filter(r => r.createdAt && new Date(r.createdAt) >= yearStart).length;

set('stat-total', total);
set('stat-cities', cities.length);
set('stat-contributors', contributors.length);
set('stat-year', thisYear);

const counts = {3:0, 2:0, 1:0, 0:0};
reviews.forEach(r => counts[r.r] = (counts[r.r] || 0) + 1);
const maxR = Math.max(...Object.values(counts), 1);
[3,2,1,0].forEach(n => {
set(`count-${n}`, counts[n]);
setTimeout(() => {
document.getElementById(`bar-${n}`).style.width = ((counts[n] / maxR) * 100) + '%';
}, 100);
});

const cityMap = {};
reviews.forEach(r => cityMap[r.location] = (cityMap[r.location] || 0) + 1);
const sortedCities = Object.entries(cityMap).sort((a,b) => b[1] - a[1]);
document.getElementById('city-grid').innerHTML = sortedCities.length
? sortedCities.map(([city, n]) => `
<div class="city-row">
<span class="city-name">${city}</span>
<span class="city-count">${n}</span>
</div>`).join('')
: '<div class="loading-state">No data yet.</div>';

const contribMap = {};
reviews.forEach(r => contribMap[r.handle] = (contribMap[r.handle] || 0) + 1);
const sortedContribs = Object.entries(contribMap).sort((a,b) => b[1] - a[1]);
document.getElementById('contrib-grid').innerHTML = sortedContribs.length
? sortedContribs.map(([handle, n]) => `
<div class="contrib-row">
<span class="contrib-handle">@${handle}</span>
<span class="contrib-count">${n} ${n === 1 ? 'entry' : 'entries'}</span>
</div>`).join('')
: '<div class="loading-state">No contributors yet.</div>';

document.querySelectorAll('.num-value').forEach(el => el.classList.remove('loading'));
}

function set(id, val) {
const el = document.getElementById(id);
if (el) el.textContent = val;
}

loadStats();
</script>

<footer></footer>
<script src="/shared.js"></script>
</body>
</html>
